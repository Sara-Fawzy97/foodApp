<section class="p-4">
  <div></div>

  <div class="d-flex justify-content-between align-items-center">
    <h2 class="h2">
      <span class="text-success"> {{ data.name }}  </span> Category Details
    </h2>
    <a>
      <mat-icon
        (click)="onNoClick()"
        class="text-center align-items-center"
        aria-hidden="false"
        aria-label="Example close icon"
        fontIcon="close"
      ></mat-icon>
    </a>
  </div>

  <mat-dialog-content>

    <div class="text-center"  *ngIf="data.recipe.length==0">
      <img class="w-75" src="../../../../../assets/images/noData-img.png" alt="no-data">
    </div>

   <div *ngIf="data.recipe.length>0" >
    <h3>Recipes: </h3>
    <div *ngFor="let r of data.recipe" class="alert alert-success d-flex justify-content-between">
      <h3>{{r.name}}</h3>
      <!-- <p>{{r.price}}$</p> -->
      <img src="{{baseImgURL}}{{r.imagePath}}" alt="">

    </div>
</div>
   


  </mat-dialog-content>

  <mat-dialog-actions>
    <button class="mat-button" mat-button mat-dialog-close>Okay</button>
  </mat-dialog-actions>
</section>
