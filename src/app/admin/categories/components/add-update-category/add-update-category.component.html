<section >
<div class="d-flex justify-content-between align-items-center">
<h1 mat-dialog-title>Add Category</h1>
   <a>
    <mat-icon (click)="onNoClick()" class=" text-center align-items-center" aria-hidden="false" aria-label="Example close icon" fontIcon="close"></mat-icon>
   </a>
</div>
<div mat-dialog-content>
  <!-- <p>What's your favorite animal?</p> -->
  <mat-form-field>
    <mat-label>Category Name</mat-label>
    <input matInput [(ngModel)]="data.name">
  </mat-form-field>
</div>
<div mat-dialog-actions class="justify-content-end">
  <!-- <button mat-button (click)="onNoClick()">No Thanks</button> -->
  <button mat-button class="mat-button"  (click)="submit()" [mat-dialog-close]="data.name" cdkFocusInitial>Save</button>
</div>
</section>
