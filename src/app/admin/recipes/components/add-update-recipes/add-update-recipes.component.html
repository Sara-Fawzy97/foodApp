<section>
  <div class="row align-items-center">
    <div class="col-8">
      <h3>Show the<span> Recipes</span> !</h3>
      <p>
        you can now fill the meals easily using the table and form ,<br />
        click here and sill it with the table !
      </p>
    </div>

   
  </div>
</section>

<div>
  
  <form [formGroup]="RecipeForm" (ngSubmit)="onSubmit()" class="w-75 text-center mt-5 ">
    <div class="input-group mb-3">
      <input
        type="text"
        formControlName="name"
        class="form-control"
        placeholder="Recipe Name"
        aria-label="Recipe Name"
        aria-describedby="basic-addon1"
      />
    </div>
<!-- tags options--->
    <select
        formControlName="tagId"
     class="form-select mb-3" aria-label="Default select example">
      <option selected>Select Tag</option>
      <option *ngFor="let tag of allTags " value="{{tag.id}}">{{tag.name}}</option>
   
    </select>

    <div class="input-group mb-3">
      <input
        formControlName="price"
        type="number"
        class="form-control"
        aria-label="Amount (to the nearest dollar)"
      />
      <span class="input-group-text">EGP</span>
    </div>

    <select class="  form-select mb-3"formControlName="categoriesIds"  aria-label="Default select example ">
      <option selected>Category</option>
      <option *ngFor="let cat of categories" value="{{cat.id}}">{{cat.name}}</option>
  
    </select>
    <div class="input-group mb-3">
      <textarea class="form-control" formControlName="description" aria-label="With textarea" placeholder="Description *"></textarea>
    </div>

    <ngx-dropzone (change)="onSelect($event)">
	<ngx-dropzone-label>Drag & Drop or Choose an Item Image To Upload <i class="fa-solid fa-arrow-up-from-bracket"></i></ngx-dropzone-label>

   <ngx-dropzone-image-preview ngProjectAs="ngx-dropzone-preview" *ngFor="let f of files" [file]="f" [removable]="true" (removed)="onRemove(f)">
  <!-- <ngx-dropzone-label>{{ f.name }} ({{ f.type }})</ngx-dropzone-label>  -->

</ngx-dropzone-image-preview>

</ngx-dropzone>
<!-- <img
  *ngIf="files.length == 0 && apiImageSrc"
  [src]="imageBaseUrl + apiImageSrc"
  width="200"
  class="rounded"> -->

  <p class="red-color">{{msgError}}</p>

    <hr />

    <div class="mt-5 float-end">
      <a (click)="resetForm()" class="btn me-5 px-5">Cancle</a>
      <button type="submit" class="btn btn-success">Save</button>
    </div>
  </form>
</div>
