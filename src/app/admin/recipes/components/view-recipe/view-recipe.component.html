<section class="p-4">
  <div></div>

  <div class="d-flex justify-content-between align-items-center">
    <h2 class="h2">
      <span class="text-success"> {{ data.name }} </span> Details
    </h2>
    <a>
      <mat-icon
        (click)="onNoClick()"
        class="text-center align-items-center"
        aria-hidden="false"
        aria-label="Example close icon"
        fontIcon="close"
      ></mat-icon>
    </a>
  </div>

  <mat-dialog-content>
    <div class="text-center">
      <img
        *ngIf="data.imagePath"
        class="mb-2 rounded shadow"
        src="{{ baseImgURL }}{{ data.imagePath }}"
        alt=""
      />
    </div>

    <h3 class="h3">Description :</h3>
    <p class="ps-1">{{ data.description }}</p>
    <h3>
      Price: <span >{{ data.price }} $</span>
    </h3>

    <div class="d-flex justify-content-between">
      <div class="d-flex">
        <h3>Tags: </h3>
        <p>
          <span class="badge text-bg-success opacity-75">{{ data.tagId.name }}</span>
        </p>
      </div>

      <div class="d-flex">
        <h3>Categories: </h3>
        <p *ngFor="let cat of data.categoriesIds">
          <span class="badge text-bg-success opacity-75">{{ cat.name}}</span>
        </p>
      </div>
    </div>

    <!-- <h3>Country: <span>{{data.country}}</span></h3> -->
  </mat-dialog-content>

  <mat-dialog-actions>
    <button class="mat-button" mat-button mat-dialog-close>Okay</button>
  </mat-dialog-actions>
</section>
