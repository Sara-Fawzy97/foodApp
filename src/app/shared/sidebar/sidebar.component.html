<section>
    <div>
        <img clas="w-75" src="../../../assets/images/logoNoText.png" alt="">
    </div>

    <div class="mt-5">
        <ul>
            <ng-container *ngFor="let item of list">
                <li class=" " *ngIf="item.isActive"><a [routerLink]="item.navLink" routerLinkActive="active"><span class="me-3"> <i [ngClass]='item.icon '></i></span>{{item.title}}</a></li>
            </ng-container>
        </ul>
        
    </div>
</section>
